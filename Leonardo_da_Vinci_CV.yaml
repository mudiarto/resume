  font_family: Source Serif 4
  font_size: 10pt
  page_size: us-letter
  color: "#4a6fa5"
  disable_external_link_icons: false
  disable_page_numbering: false
  page_numbering_style: NAME - Page PAGE_NUMBER of TOTAL_PAGES
  disable_last_updated_date: false
  last_updated_date_style: Last updated in TODAY
  header_font_size: 30pt
  text_alignment: justified
  seperator_between_connections: ""
  use_icons_for_connections: true
  margins:
    page:
      top: 2cm
      bottom: 2cm
      left: 2cm
      right: 2cm
    section_title:
      top: 0.3cm
      bottom: 0.2cm
    entry_area:
      left_and_right: 0.2cm
      vertical_between: 0.2cm
    highlights_area:
      top: 0.10cm
      left: 0.4cm
      vertical_between_bullet_points: 0.10cm
    header:
      vertical_between_name_and_connections: 0.3cm
      bottom: 0.3cm

locale:
  language: english
  last_updated: Last updated in
  month: month
  months: months
  year: year
  years: years
  present: present
  to: –
  abbreviations_for_months:
